<div class="page-container">
  <div class="page-header">
    <h1>Rooms</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> Add Room
    </button>
  </div>

  <mat-card>
    <table mat-table [dataSource]="rooms" class="full-width">
      <ng-container matColumnDef="roomNumber">
        <th mat-header-cell *matHeaderCellDef>Room No.</th>
        <td mat-cell *matCellDef="let r">{{ r.roomNumber }}</td>
      </ng-container>
      <ng-container matColumnDef="roomType">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let r">{{ r.roomType }}</td>
      </ng-container>
      <ng-container matColumnDef="floor">
        <th mat-header-cell *matHeaderCellDef>Floor</th>
        <td mat-cell *matCellDef="let r">{{ r.floor }}</td>
      </ng-container>
      <ng-container matColumnDef="capacity">
        <th mat-header-cell *matHeaderCellDef>Capacity</th>
        <td mat-cell *matCellDef="let r">{{ r.capacity }}</td>
      </ng-container>
      <ng-container matColumnDef="pricePerNight">
        <th mat-header-cell *matHeaderCellDef>Price/Night</th>
        <td mat-cell *matCellDef="let r">${{ r.pricePerNight }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r">
          <span class="status-chip" [ngClass]="r.status.toLowerCase()">{{ r.status }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let r" class="action-buttons">
          <button mat-icon-button color="primary" (click)="openDialog(r)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="delete(r)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
