<div class="page-container">
  <div class="page-header">
    <h1>Bookings</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> New Booking
    </button>
  </div>

  <mat-card style="margin-bottom: 16px; padding: 16px;">
    <mat-form-field style="width: 200px;">
      <mat-label>Filter by status</mat-label>
      <mat-select [(ngModel)]="statusFilter" (ngModelChange)="loadBookings()">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let s of statuses.slice(1)" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-card>

  <mat-card>
    <table mat-table [dataSource]="bookings" class="full-width">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let b">{{ b.id }}</td>
      </ng-container>
      <ng-container matColumnDef="guest">
        <th mat-header-cell *matHeaderCellDef>Guest</th>
        <td mat-cell *matCellDef="let b">{{ getGuestName(b) }}</td>
      </ng-container>
      <ng-container matColumnDef="room">
        <th mat-header-cell *matHeaderCellDef>Room</th>
        <td mat-cell *matCellDef="let b">{{ getRoomNumber(b) }}</td>
      </ng-container>
      <ng-container matColumnDef="checkInDate">
        <th mat-header-cell *matHeaderCellDef>Check-In</th>
        <td mat-cell *matCellDef="let b">{{ b.checkInDate }}</td>
      </ng-container>
      <ng-container matColumnDef="checkOutDate">
        <th mat-header-cell *matHeaderCellDef>Check-Out</th>
        <td mat-cell *matCellDef="let b">{{ b.checkOutDate }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let b">
          <span class="status-chip" [ngClass]="b.status.toLowerCase()">{{ b.status }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="totalAmount">
        <th mat-header-cell *matHeaderCellDef>Total</th>
        <td mat-cell *matCellDef="let b">${{ b.totalAmount | number:'1.2-2' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let b" class="action-buttons">
          <button mat-icon-button color="accent" title="Check In"
            *ngIf="b.status === 'CONFIRMED'" (click)="checkIn(b)">
            <mat-icon>login</mat-icon>
          </button>
          <button mat-icon-button color="primary" title="Check Out"
            *ngIf="b.status === 'CHECKED_IN'" (click)="checkOut(b)">
            <mat-icon>logout</mat-icon>
          </button>
          <button mat-icon-button color="warn" title="Cancel"
            *ngIf="b.status === 'CONFIRMED'" (click)="cancel(b)">
            <mat-icon>cancel</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
